<style>
  :root{
    --ink:#16120D; --ink-2:#241D14;
    --orange:#F1611C; --orange-2:#FF8A4C; --orange-d:#C84E16;
    --stamp:#8A3A12; --stamp-soft:#8a3a1212;
    --paper:#FBF6EF; --paper-2:#F1E7D6; --card:#FFFFFF;
    --line:#E3D6C2; --muted:#6E6052; --txt:#241D14;
    --teal:#2F6B5E; --teal-soft:#2f6b5e14;
    --maxw:1220px; --pad:clamp(18px,4.5vw,62px);
    --disp:'Sora',sans-serif; --body:'Jost',sans-serif; --ara:'Tajawal',sans-serif;
    --shadow:0 16px 38px rgba(22,18,13,.12); --r:16px;
  }
  html[lang="ar"]{--body:'Tajawal',sans-serif;--disp:'Tajawal',sans-serif;}
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{font-family:var(--body);background:var(--paper);color:var(--txt);line-height:1.65;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
  a{color:inherit;text-decoration:none;} img{display:block;max-width:100%;} button{font-family:inherit;cursor:pointer;}
  ::selection{background:var(--orange);color:#fff;}
  .wrap{max-width:var(--maxw);margin:0 auto;padding-inline:var(--pad);}
  h1,h2,h3{line-height:1.16;font-weight:800;}
  html[lang="fr"] h1,html[lang="fr"] h2,html[lang="fr"] h3{font-family:var(--disp);letter-spacing:-.01em;}
  :focus-visible{outline:2px solid var(--orange);outline-offset:3px;}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;scroll-behavior:auto;}}
  [data-reveal]{opacity:0;transform:translateY(20px);transition:opacity .6s ease,transform .6s cubic-bezier(.2,.7,.2,1);}
  [data-reveal].in{opacity:1;transform:none;}
  section[id]{scroll-margin-top:84px;}

  /* signature: stamp badge */
  .stamp{position:relative;display:inline-flex;align-items:center;justify-content:center;width:74px;height:74px;border-radius:50%;border:2px solid var(--stamp);flex:none;}
  .stamp::before{content:"";position:absolute;inset:6px;border-radius:50%;border:1px dashed var(--stamp);opacity:.6;}
  .stamp span{position:relative;font-family:var(--disp);font-weight:800;font-size:10.5px;color:var(--stamp);text-align:center;line-height:1.15;letter-spacing:.02em;text-transform:uppercase;}
  html[lang="ar"] .stamp span{text-transform:none;font-size:11px;}
  .stamp.sm{width:46px;height:46px;} .stamp.sm span{font-size:8.5px;}
  .stamp.lt{border-color:var(--orange);} .stamp.lt::before{border-color:var(--orange);} .stamp.lt span{color:var(--orange-d);}

  /* topbar */
  .topbar{background:var(--ink);color:#cabfae;font-size:12.5px;}
  .topbar .in{display:flex;align-items:center;gap:16px;height:38px;}
  .topbar .info{display:inline-flex;align-items:center;gap:7px;} .topbar a:hover{color:#fff;}
  .topbar svg{width:14px;height:14px;}
  .topbar .langwrap{margin-inline-start:auto;display:flex;align-items:center;gap:7px;}
  .topbar .lang{display:flex;border:1px solid rgba(255,255,255,.2);border-radius:7px;overflow:hidden;}
  .topbar .lang button{background:none;border:0;color:#b9ad99;font-weight:700;font-size:12px;padding:5px 12px;transition:.2s;min-height:28px;}
  .topbar .lang button.on{color:#fff;background:var(--orange);}

  /* header */
  header.nav{position:sticky;top:0;z-index:70;background:rgba(251,246,239,.95);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);}
  .nav-in{display:flex;align-items:center;gap:14px;height:72px;}
  .brand{display:flex;align-items:center;gap:10px;flex:none;}
  .hdmark{width:46px;height:46px;border-radius:11px;display:block;object-fit:cover;flex:none;}
  .brand .bn{display:flex;flex-direction:column;line-height:1.18;}
  .brand .bn b{font-size:14.5px;color:var(--ink);font-weight:800;}
  .brand .bn span{font-size:10px;color:var(--muted);}
  nav.menu{display:flex;gap:1px;margin-inline-start:14px;}
  nav.menu a{font-size:14px;font-weight:600;color:#473b2c;padding:9px 12px;border-radius:9px;transition:.2s;cursor:pointer;}
  nav.menu a:hover{color:var(--orange-d);background:var(--paper-2);}
  .nav-cta{display:inline-flex;align-items:center;gap:8px;background:#25D366;color:#08361f;font-weight:700;font-size:13.5px;padding:11px 18px;border-radius:10px;transition:.2s;flex:none;margin-inline-start:auto;}
  .nav-cta:hover{background:#1fbe5a;transform:translateY(-1px);}
  .burger{display:none;width:44px;height:44px;border:1px solid var(--line);border-radius:11px;background:#fff;align-items:center;justify-content:center;flex:none;}
  .burger svg{width:21px;height:21px;stroke:var(--ink);}
  .mob{display:none;background:var(--ink);}
  .mob a{display:block;padding:14px var(--pad);color:#e7ddcb;border-bottom:1px solid rgba(255,255,255,.1);font-weight:600;}

  /* hero — full slider like a real estate agency homepage */
  .hero{position:relative;overflow:hidden;min-height:clamp(420px,62vw,560px);display:flex;align-items:center;color:#fff;}
  .hslide{position:absolute;inset:0;opacity:0;transition:opacity 1.1s ease;z-index:0;}
  .hslide.on{opacity:1;z-index:1;}
  .hslide img{width:100%;height:100%;object-fit:cover;display:block;}
  .hslide::after{content:"";position:absolute;inset:0;background:linear-gradient(95deg,rgba(22,18,13,.78) 0%,rgba(22,18,13,.52) 45%,rgba(22,18,13,.32) 100%);}
  .hero .wrap{position:relative;z-index:2;padding-block:clamp(40px,7vw,80px);}
  .hero .in{max-width:34em;}
  .heyebrow{display:inline-flex;align-items:center;gap:10px;margin-bottom:18px;}
  .heyebrow b{font-size:13px;color:#fff;font-weight:700;}
  .heyebrow span{font-size:11px;color:#d8cdba;display:block;}
  .hero h1{font-size:clamp(29px,4.6vw,48px);color:#fff;letter-spacing:-.01em;}
  .hero h1 .o{color:var(--orange-2);}
  .hero p{font-size:clamp(14.5px,1.6vw,17px);color:#e7ddcb;font-weight:300;margin-top:16px;max-width:34em;}
  html[lang="ar"] .hero p{font-weight:400;}
  .hero .cta{display:flex;gap:11px;flex-wrap:wrap;margin-top:26px;}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;font-weight:700;font-size:14px;padding:13px 22px;border-radius:11px;border:1px solid transparent;transition:transform .2s,background .2s,color .2s,border-color .2s;}
  .btn svg{width:17px;height:17px;}
  .btn-wa{background:#25D366;color:#08361f;} .btn-wa:hover{background:#1fbe5a;transform:translateY(-2px);}
  .btn-dark{background:var(--ink);color:#fff;} .btn-dark:hover{background:var(--ink-2);transform:translateY(-2px);}
  .btn-line{background:transparent;color:#fff;border-color:rgba(255,255,255,.55);} .btn-line:hover{background:#fff;color:var(--ink);border-color:#fff;}
  .hdots{position:absolute;z-index:3;bottom:22px;inset-inline-start:50%;transform:translateX(-50%);display:flex;gap:8px;}
  html[dir="rtl"] .hdots{transform:translateX(50%);}
  .hdot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.4);border:0;cursor:pointer;transition:.2s;}
  .hdot.on{background:#fff;width:22px;border-radius:5px;}
  @media (prefers-reduced-motion:reduce){.hslide{transition:opacity .01s linear;}}

  /* feats strip */
  .feats{background:var(--ink);color:#e7ddcb;}
  .feats .in{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;padding:18px 0;}
  .feat{display:flex;align-items:center;gap:10px;justify-content:center;font-size:13px;font-weight:600;text-align:center;}
  .feat svg{width:20px;height:20px;stroke:var(--orange-2);flex:none;}

  /* sections */
  .block{padding-block:clamp(46px,7vw,84px);}
  .shead{margin-bottom:30px;max-width:42em;}
  .shead.center{margin-inline:auto;text-align:center;}
  .kicker{display:inline-flex;align-items:center;gap:9px;font-size:12px;letter-spacing:.04em;color:var(--orange-d);font-weight:700;margin-bottom:11px;}
  .kicker::before{content:"";width:20px;height:2px;background:var(--orange);border-radius:2px;}
  .shead.center .kicker{justify-content:center;}
  h2.title{font-size:clamp(24px,3.4vw,36px);color:var(--ink);letter-spacing:-.01em;}
  .lead{font-size:clamp(14.5px,1.6vw,16.5px);color:var(--muted);margin-top:12px;font-weight:300;}
  html[lang="ar"] .lead{font-weight:400;}


  /* filter tabs */
  .ftabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:26px;}
  .ftabs button{background:var(--card);border:1px solid var(--line);color:var(--muted);font-size:13px;font-weight:700;padding:9px 16px;border-radius:100px;transition:.2s;}
  .ftabs button:hover{border-color:var(--orange);color:var(--ink);}
  .ftabs button.on{background:var(--ink);border-color:var(--ink);color:#fff;}

  /* listing grid */
  .lgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;}
  .lcard{background:var(--card);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;transition:transform .25s,box-shadow .25s;}
  .lcard:hover{transform:translateY(-4px);box-shadow:var(--shadow);}
  .lopen{cursor:pointer;}
  .lcard .li{position:relative;aspect-ratio:16/10;overflow:hidden;}
  .lcard .li img{width:100%;height:100%;object-fit:cover;transition:opacity .25s;}
  .lcard .stamp.sm{position:absolute;top:10px;inset-inline-end:10px;background:rgba(255,255,255,.92);transform:rotate(-8deg);transition:transform .25s;z-index:2;}
  .lcard:hover .stamp.sm{transform:rotate(0deg);}
  .gnav{position:absolute;top:50%;transform:translateY(-50%);width:34px;height:34px;border-radius:50%;border:0;background:rgba(22,18,13,.55);color:#fff;font-size:19px;line-height:1;display:flex;align-items:center;justify-content:center;z-index:3;transition:background .2s;}
  .gnav:hover{background:rgba(22,18,13,.85);}
  .gnav.prev{inset-inline-start:10px;} .gnav.next{inset-inline-end:10px;}
  .gdots{position:absolute;bottom:10px;inset-inline-start:0;inset-inline-end:0;display:flex;justify-content:center;gap:6px;z-index:3;}
  .gdot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.55);border:0;cursor:pointer;}
  .gdot.on{background:#fff;}
  .lbody{padding:15px;border-top:1px dashed var(--line);}
  .lloc{font-size:11.5px;color:var(--muted);font-weight:600;display:flex;align-items:center;gap:5px;margin-bottom:5px;}
  .lloc svg{width:13px;height:13px;stroke:var(--orange-d);}
  .ltitle{font-size:15.5px;font-weight:800;color:var(--ink);margin-bottom:6px;line-height:1.3;}
  html[lang="fr"] .ltitle{font-family:var(--body);}
  .lspec{font-size:12px;color:var(--muted);margin-bottom:10px;}
  .lprice{display:flex;align-items:baseline;justify-content:space-between;border-top:1px solid var(--line);padding-top:10px;}
  .lprice b{font-family:var(--disp);font-size:16px;color:var(--ink);}
  .lprice span{font-size:10.5px;color:var(--muted);}

function Hero(){
 const slides=[IMG.house1,IMG.house2,IMG.car].map((src,i)=>`<div class="hslide ${i===0?'on':''}" data-i="${i}"><img src="${src}" alt=""></div>`).join('');
 const dots=[0,1,2].map(i=>`<button type="button" class="hdot ${i===0?'on':''}" data-i="${i}" aria-label="slide ${i+1}"></button>`).join('');
 return `<section class="hero" id="home">
   ${slides}
   <div class="wrap"><div class="in" data-reveal>
     <span class="heyebrow"><span class="stamp sm lt"><span>HD</span></span><span><b>${t('hey_b')}</b><span>${t('hey_s')}</span></span></span>
     <h1>${t('h1a')} <span class="o">${t('h1b')}</span> ${t('h1c')}</h1>
     <p>${t('h_p')}</p>
     <div class="cta">
       <a class="btn btn-wa" href="https://wa.me/${WA}" target="_blank" rel="noopener">${wa} ${t('h_cta1')}</a>
       <a class="btn btn-line" data-go="store">${t('h_cta2')} ${sv(arEnd())}</a>
     </div>
   </div></div>
   <div class="hdots">${dots}</div>
 </section>
 <div class="feats"><div class="wrap"><div class="in">
   ${t('feats').map(f=>`<div class="feat">${sv(f[1])} ${f[0]}</div>`).join('')}
 </div></div></div>`;
}

function ListingCards(){
 const list=LISTINGS.filter(l=>FILTER==='all'||l.cat===FILTER);
 return list.map(l=>{
   const d=l[LANG];
   const imgsAttr=l.imgs.join('|');
   const dots=l.imgs.map((_,i)=>`<span class="gdot ${i===0?'on':''}" data-i="${i}"></span>`).join('');
   return `<div class="lcard" data-reveal data-id="${l.id}">
     <div class="li lopen" data-imgs="${imgsAttr}" data-idx="0">
       <img src="${l.imgs[0]}" alt="${d[0]}" loading="lazy">
       ${l.badge?`<span class="stamp sm"><span>${l.badge}</span></span>`:''}
       ${l.imgs.length>1?`<button type="button" class="gnav prev" data-dir="-1" aria-label="prev">‹</button><button type="button" class="gnav next" data-dir="1" aria-label="next">›</button><div class="gdots">${dots}</div>`:''}
     </div>
     <div class="lbody">
       <div class="lloc">${sv('pin')} ${d[1]}</div>
       <div class="ltitle lopen">${d[0]}</div>
       <div class="lspec">${d[2]}</div>
       <div class="lprice"><b>${l.price}</b><span>${t('cur')}</span></div>
       <button type="button" class="lcta lopen">${t('cta_inquire')} ${sv(arEnd())}</button>
     </div>
   </div>`;
 }).join('');
}

function ListingDetail(l){
 const d=l[LANG];
 const msg=encodeURIComponent(LANG==='ar'?`مرحباً، أنا مهتم بالعرض: ${d[0]} — ${d[1]}`:`Bonjour, je suis intéressé par : ${d[0]} — ${d[1]}`);
 const dateFmt=new Date(l.date).toLocaleDateString(LANG==='ar'?'ar-MA':'fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'});
 return `<div class="mtop"><button type="button" class="mclose" id="mClose" aria-label="${t('m_close')}">${sv('plus',' style="transform:rotate(45deg)"')}</button></div>
   <div class="mgal"><img src="${l.imgs[0]}" alt="${d[0]}"></div>
   <div class="mbody">
     <div class="mhead">
       <div><div class="mloc">${sv('pin')} ${d[1]}</div><h3 class="mtitle">${d[0]}</h3></div>
       <div class="mprice">${l.price}<span>${t('cur')}</span></div>
     </div>
     <div class="mgrid">
       <div class="mstat"><b>${d[2]}</b><span>${t('m_area')}</span></div>
       <div class="mstat"><b>${dateFmt}</b><span>${t('m_date')}</span></div>
     </div>
     <div class="msec"><h4>${t('m_desc')}</h4><p>${d[3]}</p></div>
     <div class="mcontact"><span class="stamp sm lt"><span>HD</span></span><div class="ct"><b>${t('m_org')}</b><span dir="ltr">${PH}</span></div></div>
     <div class="mactions">
       <a class="btn btn-wa" href="https://wa.me/${WA}?text=${msg}" target="_blank" rel="noopener">${wa} ${t('m_wa')}</a>
       <a class="btn btn-line" href="tel:${PHt}">${sv('phone')} ${t('m_call')}</a>
     </div>
   </div>`;
}
function openListing(id){
 const l=LISTINGS.find(x=>x.id===id); if(!l)return;
 document.getElementById('modalCard').innerHTML=ListingDetail(l);
 document.getElementById('modal').classList.add('open');
 document.body.classList.add('modal-lock');
 document.getElementById('modal').dataset.id=id;
 const mc=document.getElementById('mClose'); if(mc)mc.onclick=closeModal;
}
function closeModal(){
 document.getElementById('modal').classList.remove('open');
 document.body.classList.remove('modal-lock');
}

function sendWA(){
 const n=document.getElementById('c-name').value.trim(),te=document.getElementById('c-tel').value.trim(),it=document.getElementById('c-int').value,m=document.getElementById('c-msg').value.trim();
 const L=T[LANG];
 const msg=`*${L.order_head}*%0A${L.c_name}: ${n||'-'}%0A${L.c_tel}: ${te||'-'}%0A${L.c_int}: ${it}%0A${L.c_msg}: ${m||'-'}`;
 window.open(`https://wa.me/${WA}?text=${msg}`,'_blank');
}
function toast(m){const el=document.getElementById('toast');el.innerHTML=sv('check',' style="stroke:#3fd07a"')+'<span>'+m+'</span>';el.style.opacity=1;el.style.transform='translateX(-50%) translateY(0)';clearTimeout(window.__tt);window.__tt=setTimeout(()=>{el.style.opacity=0;el.style.transform='translateX(-50%) translateY(20px)';},2200);}

function scrollTo(id){const el=document.getElementById(id);if(el)el.scrollIntoView({behavior:'smooth'});}
function render(){
 document.documentElement.lang=LANG; document.documentElement.dir='rtl';
 document.getElementById('root').innerHTML=Header()+Hero()+Store()+Why()+Faq()+Contact()+Footer();
 wire();
}
function setLang(l){LANG=l;render();window.scrollTo(0,0);}
function refreshGrid(){const g=document.getElementById('lgrid');if(g){g.innerHTML=ListingCards();}
 document.querySelectorAll('.ftabs button').forEach(b=>b.classList.toggle('on',b.dataset.f===FILTER));
 io_observe();
}
let _io;
function io_observe(){document.querySelectorAll('[data-reveal]:not(.in)').forEach(el=>_io.observe(el));}
let _heroTimer;
function heroSlider(){
 clearInterval(_heroTimer);
 const slides=document.querySelectorAll('.hslide'), dots=document.querySelectorAll('.hdot');
 if(!slides.length)return;
 let i=0;
 const go=n=>{slides.forEach(s=>s.classList.remove('on'));dots.forEach(d=>d.classList.remove('on'));slides[n].classList.add('on');dots[n].classList.add('on');i=n;};
 dots.forEach(d=>d.addEventListener('click',()=>go(parseInt(d.dataset.i,10))));
 _heroTimer=setInterval(()=>go((i+1)%slides.length),4500);
}
function wire(){
 _io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');_io.unobserve(e.target);}}),{threshold:.08});
 io_observe();
 document.querySelectorAll('.langbtn').forEach(b=>b.addEventListener('click',()=>setLang(b.dataset.lang)));
 document.querySelectorAll('[data-go]').forEach(a=>a.addEventListener('click',()=>{const m=document.getElementById('mob');if(m)m.style.display='none';scrollTo(a.dataset.go);}));
 document.querySelectorAll('.ftabs button').forEach(b=>b.addEventListener('click',()=>{FILTER=b.dataset.f;refreshGrid();}));
 const burger=document.getElementById('burger'),mob=document.getElementById('mob');
 if(burger)burger.onclick=()=>{mob.style.display=mob.style.display==='block'?'none':'block';};
 const ws=document.getElementById('waSend'); if(ws)ws.addEventListener('click',sendWA);
 document.querySelectorAll('.qa .q').forEach(q=>q.addEventListener('click',()=>{
   const qa=q.parentElement,a=qa.querySelector('.a'),open=qa.classList.contains('open');
   document.querySelectorAll('.qa').forEach(x=>{x.classList.remove('open');x.querySelector('.a').style.maxHeight=null;});
   if(!open){qa.classList.add('open');a.style.maxHeight=a.scrollHeight+'px';}
 }));
 // listing card clicks (delegated, survives grid re-render): gallery nav/dots, or open detail modal
 const grid=document.getElementById('lgrid');
 if(grid)grid.addEventListener('click',e=>{
   const nav=e.target.closest('.gnav'), dot=e.target.closest('.gdot');
   if(nav||dot){
     const li=e.target.closest('.li'); if(!li)return;
     const imgs=li.dataset.imgs.split('|');
     let idx=parseInt(li.dataset.idx,10)||0;
     if(nav) idx=(idx+parseInt(nav.dataset.dir,10)+imgs.length)%imgs.length;
     if(dot) idx=parseInt(dot.dataset.i,10);
     li.dataset.idx=idx;
     const img=li.querySelector('img'); if(img) img.src=imgs[idx];
     li.querySelectorAll('.gdot').forEach((d,i)=>d.classList.toggle('on',i===idx));
     return;
   }
   const opener=e.target.closest('.lopen'); if(!opener)return;
   const card=e.target.closest('.lcard'); if(!card)return;
   openListing(parseInt(card.dataset.id,10));
 });
 heroSlider();
}
document.getElementById('modalBg').addEventListener('click',closeModal);
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeModal();});
render();
</script>
